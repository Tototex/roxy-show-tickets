name: Build Plugin ZIP

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set plugin slug
        id: vars
        run: echo "PLUGIN_SLUG=roxy-show-tickets" >> "$GITHUB_ENV"

      - name: Prepare build folder
        run: |
          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"
          rsync -av ./ "build/${PLUGIN_SLUG}/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'build/' \
            --exclude '.DS_Store' \
            --exclude '*.zip'

      - name: Create plugin ZIP
        run: |
          cd build
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}-zip
          path: build/${{ env.PLUGIN_SLUG }}.zip
          if-no-files-found: error

      - name: Create GitHub Release and upload ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.PLUGIN_SLUG }}.zip
          generate_release_notes: true
